name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v

  esphome-config:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chip: [esp32, esp32-s3, esp32-c3]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: esphome config firmware/boards/${{ matrix.chip }}.yaml

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test tests/js/*.test.js   # shell-expanded glob (node --test glob patterns need Node 21+)
