name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v

  esphome-config:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chip: [esp32, esp32-s3, esp32-c3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: esphome config firmware/boards/${{ matrix.chip }}.yaml
