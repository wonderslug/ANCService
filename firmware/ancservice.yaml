# ANCService — canonical firmware config.
# Standalone-compilable (default board esp32dev) so Home Assistant "adopt" works.
# Build-time overrides: -s ancs_ref <tag|branch>   (board set by boards/<chip>.yaml wrappers)
substitutions:
  ancs_ref: "v1.1.2"          # pinned esphome-ancs release; auto-bumped on component release
  device_name: "ancservice"

esphome:
  name: "${device_name}"
  name_add_mac_suffix: true
  project:
    name: "wonderslug.ancservice"
    version: "v1"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/wonderslug/esphome-ancs
      ref: "${ancs_ref}"
    components: [ancs]

logger:

ancs:
  id: my_ancs
  # No explicit name: the BLE advertised name defaults to the node name, which
  # carries the per-device MAC suffix (name_add_mac_suffix above) -> e.g.
  # "ancservice-a1b2c3". Unique per unit, so multiple devices are distinguishable
  # in a BLE scanner during pairing. (esphome-ancs >= v1.1.2.)
  auto_fetch_attributes: true
  fetch_attributes: [app_id, title, subtitle, message, date]
  on_notification_attributes:
    - logger.log:
        format: "ATTRS     uid=%u  dev=%-16s  cat=%-16s  app=%s  title=%s  sub=%s  msg=%s  date=%s"
        tag: "ancs.notification_attrs"
        args:
          - uid
          - device_name.c_str()
          - category.c_str()
          - app_id.c_str()
          - title.c_str()
          - subtitle.c_str()
          - message.c_str()
          - date.c_str()
    - if:
        condition:
          lambda: 'return category == "incoming_call";'
        then:
          - homeassistant.event:
              event: esphome.ancs_incoming_call
              data:
                uid: !lambda 'return std::to_string(uid);'
                caller: !lambda 'return title;'
                app_id: !lambda 'return app_id;'
                date: !lambda 'return date;'
                device_name: !lambda 'return std::string(App.get_name());'
                iphone_name: !lambda 'return device_name;'
        else:
          - homeassistant.event:
              event: esphome.ancs_notification
              data:
                uid: !lambda 'return std::to_string(uid);'
                category: !lambda 'return category;'
                app_id: !lambda 'return app_id;'
                title: !lambda 'return title;'
                subtitle: !lambda 'return subtitle;'
                message: !lambda 'return message;'
                date: !lambda 'return date;'
                device_name: !lambda 'return std::string(App.get_name());'
                iphone_name: !lambda 'return device_name;'
  on_notification_removed:
    - logger.log:
        format: "REMOVED   uid=%u  dev=%-16s  cat=%-16s"
        tag: "ancs.notification_removed"
        args:
          - uid
          - device_name.c_str()
          - category.c_str()
    - if:
        condition:
          lambda: 'return category == "incoming_call";'
        then:
          - homeassistant.event:
              event: esphome.ancs_call_ended
              data:
                uid: !lambda 'return std::to_string(uid);'
                device_name: !lambda 'return std::string(App.get_name());'
                iphone_name: !lambda 'return device_name;'

web_server:                    # local device page (shares web_server_base with captive_portal)
  version: 3
  sorting_groups:
    - id: sg_notifications
      name: "Notifications"
      sorting_weight: 10
    - id: sg_device
      name: "Device"
      sorting_weight: 20
    - id: sg_actions
      name: "Actions"
      sorting_weight: 30
    - id: sg_system
      name: "System"
      sorting_weight: 40

sensor:                        # general device-health diagnostics, curated for HA
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    entity_category: diagnostic
    update_interval: 5min        # slow-changing diagnostic; no need to poll at the 60s platform default
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 10
    on_raw_value:
      then:
        - text_sensor.template.publish:
            id: uptime_human
            state: !lambda |-
              int total = (int)round(x);
              int d = total / 86400;
              int h = (total % 86400) / 3600;
              int m = (total % 3600) / 60;
              int s = total % 60;
              char result[32] = "";
              if (d > 0) {
                snprintf(result + strlen(result), sizeof(result) - strlen(result), "%dd ", d);
              }
              if (h > 0) {
                snprintf(result + strlen(result), sizeof(result) - strlen(result), "%dh ", h);
              }
              if (m > 0) {
                snprintf(result + strlen(result), sizeof(result) - strlen(result), "%dm ", m);
              }
              snprintf(result + strlen(result), sizeof(result) - strlen(result), "%ds", s);
              return std::string(result);

binary_sensor:                 # live connection/call state, curated for at-a-glance HA visibility
  - platform: ancs
    ancs_id: my_ancs
    connected:
      name: "iPhone Connected"
      web_server:
        sorting_group_id: sg_notifications
        sorting_weight: 10
    call_active:
      name: "Call Active"
      web_server:
        sorting_group_id: sg_notifications
        sorting_weight: 20

text_sensor:                   # last-notification text + device identity, curated for HA
  - platform: ancs
    ancs_id: my_ancs
    last_title:
      name: "Last Notification"
      web_server:
        sorting_group_id: sg_notifications
        sorting_weight: 30
    last_message:
      name: "Last Message"
      web_server:
        sorting_group_id: sg_notifications
        sorting_weight: 40
    last_caller:
      name: "Last Caller"
      web_server:
        sorting_group_id: sg_notifications
        sorting_weight: 50
    last_app_id:
      name: "Last App ID"
      web_server:
        sorting_group_id: sg_notifications
        sorting_weight: 60
    advertised_name:
      name: "Advertised Name"
      entity_category: diagnostic
      web_server:
        sorting_group_id: sg_device   # joined by name_suffix (text entity) below
        sorting_weight: 10
  - platform: template
    name: "ANCS Library Version"
    entity_category: diagnostic
    icon: "mdi:tag-outline"
    lambda: 'return std::string("${ancs_ref}");'   # ${ancs_ref} resolves at compile time to the pinned component release
    web_server:
      sorting_group_id: sg_device
      sorting_weight: 15
  - platform: template
    name: "Uptime"          # populated by uptime_sensor's on_raw_value lambda above
    id: uptime_human
    entity_category: diagnostic
    icon: "mdi:clock-start"
    web_server:
      sorting_group_id: sg_system
      sorting_weight: 20

text:                          # user-editable BLE name suffix (see ancs: comment above)
  - platform: ancs
    ancs_id: my_ancs
    name: "Device Name Suffix"
    entity_category: config
    web_server:
      sorting_group_id: sg_device
      sorting_weight: 20

button:                        # bond management — re-pair and connection reset controls
  - platform: template
    name: "Clear Bonds (Re-pair)"
    entity_category: config
    on_press:
      - ancs.clear_bonds: my_ancs   # wipes ALL bonds and restarts the device — destructive
    web_server:
      sorting_group_id: sg_actions
      sorting_weight: 10
  - platform: template
    name: "Disconnect"
    entity_category: config
    on_press:
      - ancs.disconnect: my_ancs
    web_server:
      sorting_group_id: sg_actions
      sorting_weight: 20

wifi:
  ap:
    ssid: "ANCService Setup"   # named, open AP; the captive portal serves the WiFi setup page

captive_portal:                # WiFi-recovery fallback shown when the device can't join a network

improv_serial:                 # WiFi creds over USB serial during web flash (NimBLE-safe)

api:                           # keyless (see spec §4.1); adoption regenerates a per-device key

ota:
  - platform: esphome

dashboard_import:
  package_import_url: github://wonderslug/ANCService/firmware/ancservice.yaml@main
  import_full_config: false
